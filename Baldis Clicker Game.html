<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baldi's Basics Clicker</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Comic Neue', 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            color: white;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
            box-sizing: border-box;
            height: 100vh;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('images/BackgroundMain.png');
            background-size: cover;
            background-position: center;
            filter: blur(8px);
            z-index: -1;
            transform: scale(1.1);
        }

        /* Split layout container */
        .game-layout {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: stretch;
            max-width: 1100px;
            margin: 0 auto;
            gap: 20px;
            height: calc(100vh - 40px);
        }

        /* Left Side: Score and Baldi Clicker */
        .left-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: rgba(51, 51, 51, 0.85);
            border: 5px solid #ff0000;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.7);
        }

        .score-container {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            color: #00ff00;
            text-shadow: 3px 3px black;
            margin: 0 0 10px 0;
            font-size: 28px;
        }

        .stats {
            font-size: 28px;
            text-shadow: 2px 2px black;
            font-weight: bold;
        }

        .nps-stats {
            font-size: 18px;
            color: #00ff00;
            text-shadow: 1px 1px black;
            margin-top: 5px;
        }

        /* Clicker area holding either Baldi or the video */
        .clicker-box {
            position: relative;
            width: 250px;
            height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #baldi-btn {
            background: none;
            border: none;
            cursor: pointer;
            transition: transform 0.1s;
            padding: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
        }

        #baldi-btn img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        #baldi-btn:active {
            transform: scale(0.95);
        }

        /* Video overlays perfectly over Baldi */
        #first-clip, #second-clip {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 4px solid yellow;
            z-index: 5;
            background: black;
            object-fit: cover;
            border-radius: 5px;
            pointer-events: none; /* Allows clicks to go through to the button underneath */
        }

        #first-clip {
            animation: fadeInVideo 2.3s ease-in-out forwards;
        }

        @keyframes fadeInVideo {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Right Side: Upgrades Shop (Always Open) */
        .right-side {
            width: 400px;
            background-color: rgba(34, 34, 34, 0.95);
            border: 5px solid #00ff00;
            border-radius: 10px;
            padding: 20px;
            box-sizing: border-box;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .panel-header h3 {
            margin: 0;
            color: #00ff00;
            font-size: 24px;
            text-align: center;
            border-bottom: 2px solid white;
            padding-bottom: 10px;
        }

        .cube-wrapper {
            perspective: 400px;
            width: 80px;
            height: 80px;
            margin: 15px auto;
        }

        .cube {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: spinCube 6s linear infinite;
        }

        .cube-face {
            position: absolute;
            width: 80px;
            height: 80px;
            border: 2px solid #00ff00;
            background-color: rgba(0, 0, 0, 0.7);
            box-sizing: border-box;
        }

        .cube-face img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .front  { transform: rotateY(  0deg) translateZ(40px); }
        .back   { transform: rotateY(180deg) translateZ(40px); }
        .right  { transform: rotateY( 90deg) translateZ(40px); }
        .left   { transform: rotateY(-90deg) translateZ(40px); }
        .top    { transform: rotateX( 90deg) translateZ(40px); }
        .bottom { transform: rotateX(-90deg) translateZ(40px); }

        @keyframes spinCube {
            from { transform: rotateX(0deg) rotateY(0deg); }
            to { transform: rotateX(360deg) rotateY(360deg); }
        }

        h4 {
            margin: 15px 0 5px 0;
            color: #ffff00;
            text-align: left;
            font-size: 18px;
        }

        .upgrade-btn {
            background-color: #0000ff;
            color: white;
            border: 2px solid white;
            padding: 10px 15px;
            font-size: 14px;
            margin: 5px 0;
            cursor: pointer;
            border-radius: 5px;
            width: 100%;
            text-align: left;
            font-family: inherit;
        }

        .upgrade-btn:disabled {
            background-color: #555;
            color: #888;
            cursor: not-allowed;
        }

        /* Loading Screen Setup */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        #loading-screen::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('images/BackgroundMain.png');
            background-size: cover;
            background-position: center;
            filter: blur(12px);
            z-index: -1;
        }

        .loading-box {
            background-color: rgba(51, 51, 51, 0.95);
            border: 5px solid #00ff00;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 0 25px black;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border-left-color: #00ff00;
            margin: 20px auto;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #fact-display {
            color: #ffff00;
            font-style: italic;
            font-size: 18px;
            margin-top: 15px;
            text-shadow: 1px 1px black;
        }

        /* Responsive stack for smaller laptop screens */
        @media (max-width: 800px) {
            .game-layout {
                flex-direction: column;
                height: auto;
            }
            .right-side {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="loading-box">
            <h2>LOADING SCHOOLHOUSE...</h2>
            <div class="spinner"></div>
            
            <div style="font-size: 14px; color: #ffffff; margin-bottom: 10px; font-weight: bold; text-shadow: 1px 1px 2px #000000;">
                &copy; Made By Izayah Orona
            </div>
            
            <div id="fact-display">Loading...</div>
        </div>
    </div>

    <div class="game-layout">
        
        <div class="left-side">
            <div class="score-container">
                <h1>Baldi's Basics Clicker</h1>
                <div class="stats">Notebooks: <span id="notebook-count">0</span></div>
                <div class="nps-stats">NPS: <span id="nps-count">0</span></div>
            </div>

            <div class="clicker-box">
                <video id="first-clip" src="videos/FirstClip.mp4" muted></video>
                <video id="second-clip" src="videos/SecondClip.mp4" loop muted></video>

                <button id="baldi-btn">
                    <img src="images/ClickThis.png" alt="Baldi Target">
                </button>
            </div>
        </div>

        <div class="right-side">
            <div class="panel-header">
                <h3>School Store Upgrades</h3>
            </div>
            
            <div class="cube-wrapper">
                <div class="cube">
                    <div class="cube-face front"><img src="images/ClickThis.png" alt="cube"></div>
                    <div class="cube-face back"><img src="images/ClickThis.png" alt="cube"></div>
                    <div class="cube-face right"><img src="images/ClickThis.png" alt="cube"></div>
                    <div class="cube-face left"><img src="images/ClickThis.png" alt="cube"></div>
                    <div class="cube-face top"><img src="images/ClickThis.png" alt="cube"></div>
                    <div class="cube-face bottom"><img src="images/ClickThis.png" alt="cube"></div>
                </div>
            </div>

            <h4>Click Multipliers</h4>
            <button class="upgrade-btn" id="upgrade-click">
                Quarter ( +1 base click ) <br> Cost: <span id="click-cost">15</span> Notebooks
            </button>
            <button class="upgrade-btn" id="upgrade-multiplier">
                Math Textbook ( x2 total click multiplier ) <br> Cost: <span id="mult-cost">100</span> Notebooks
            </button>

            <h4>Passive Income</h4>
            <button class="upgrade-btn" id="upgrade-auto1">
                Shiny Quarter ( +1 NPS ) <br> Cost: <span id="auto1-cost">50</span> Notebooks
            </button>
            <button class="upgrade-btn" id="upgrade-auto2">
                BSODA ( +5 NPS ) <br> Cost: <span id="auto2-cost">250</span> Notebooks
            </button>
        </div>

    </div>

    <script>
        let notebooks = 0;
        let notebooksPerClick = 1;
        let multiplier = 1;
        let notebooksPerSecond = 0;

        let clickCost = 15;
        let multCost = 100;
        let auto1Cost = 50;
        let auto2Cost = 250;

        const baldiFacts = [
            "Fact: The original game was made in just a few days for a game jam!",
            "Fact: Arts and Crafters is the shy sock puppet who attacks if you look at him too long.",
            "Fact: The Principal of the Thing will send you to detention if he catches you running.",
            "Fact: Baldi's favorite food is crunchy quarters... just kidding, he likes notebooks!",
            "Fact: Playtime just wants to jump rope with you. Five times!",
            "Fact: If you click so fast on baldi duddy and Mike(Michael) will appear!"
        ];

        const randomFact = baldiFacts[Math.floor(Math.random() * baldiFacts.length)];
        document.getElementById('fact-display').textContent = randomFact;

        setTimeout(() => {
            document.getElementById('loading-screen').style.display = 'none';
        }, 3000);

        let clickTimes = [];
        const SPAM_THRESHOLD = 7; 
        let firstVideoStarted = false;

        const firstVideo = document.getElementById('first-clip');
        const secondVideo = document.getElementById('second-clip');

        function checkSpamSpeed() {
            const now = Date.now();
            clickTimes.push(now);
            clickTimes = clickTimes.filter(time => now - time < 1000);

            if (clickTimes.length >= SPAM_THRESHOLD) {
                if (!firstVideoStarted) {
                    firstVideoStarted = true;
                    firstVideo.style.display = 'block';
                    firstVideo.play();
                } else if (firstVideo.currentTime > 0 && !firstVideo.paused) {
                    firstVideo.style.display = 'none';
                    firstVideo.pause();
                    secondVideo.style.display = 'block';
                    secondVideo.play();
                }
            }
        }

        setInterval(() => {
            const now = Date.now();
            clickTimes = clickTimes.filter(time => now - time < 1000);

            if (clickTimes.length === 0) {
                firstVideo.pause(); firstVideo.currentTime = 0; firstVideo.style.display = 'none';
                secondVideo.pause(); secondVideo.currentTime = 0; secondVideo.style.display = 'none';
                firstVideoStarted = false;
            }
        }, 800);

        const notebookDisplay = document.getElementById('notebook-count');
        const npsDisplay = document.getElementById('nps-count');
        const baldiBtn = document.getElementById('baldi-btn');

        function updateUI() {
            notebookDisplay.textContent = Math.floor(notebooks);
            npsDisplay.textContent = notebooksPerSecond;
            
            document.getElementById('click-cost').textContent = clickCost;
            document.getElementById('mult-cost').textContent = multCost;
            document.getElementById('auto1-cost').textContent = auto1Cost;
            document.getElementById('auto2-cost').textContent = auto2Cost;

            document.getElementById('upgrade-click').disabled = notebooks < clickCost;
            document.getElementById('upgrade-multiplier').disabled = notebooks < multCost;
            document.getElementById('upgrade-auto1').disabled = notebooks < auto1Cost;
            document.getElementById('upgrade-auto2').disabled = notebooks < auto2Cost;
        }

        baldiBtn.addEventListener('keydown', (e) => {
            if (e.repeat) { e.preventDefault(); return; }
        });

        baldiBtn.addEventListener('mousedown', () => {
            notebooks += (notebooksPerClick * multiplier);
            updateUI();
            checkSpamSpeed();
        });

        document.getElementById('upgrade-click').addEventListener('click', () => {
            if (notebooks >= clickCost) { notebooks -= clickCost; notebooksPerClick += 1; clickCost = Math.round(clickCost * 1.5); updateUI(); }
        });
        document.getElementById('upgrade-multiplier').addEventListener('click', () => {
            if (notebooks >= multCost) { notebooks -= multCost; multiplier *= 2; multCost = Math.round(multCost * 2.5); updateUI(); }
        });
        document.getElementById('upgrade-auto1').addEventListener('click', () => {
            if (notebooks >= auto1Cost) { notebooks -= auto1Cost; notebooksPerSecond += 1; auto1Cost = Math.round(auto1Cost * 1.6); updateUI(); }
        });
        document.getElementById('upgrade-auto2').addEventListener('click', () => {
            if (notebooks >= auto2Cost) { notebooks -= auto2Cost; notebooksPerSecond += 5; auto2Cost = Math.round(auto2Cost * 1.7); updateUI(); }
        });

        setInterval(() => {
            if (notebooksPerSecond > 0) { notebooks += (notebooksPerSecond / 10); updateUI(); }
        }, 100);

        updateUI();
    </script>
</body>
</html>
