<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baldi's Basics Clicker</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght=400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="Style.css">
</head>
<body>

    <div id="loading-screen">
        <div class="loading-box">
            <h2>LOADING SCHOOLHOUSE...</h2>
            <div class="spinner"></div>
            
            <div style="font-size: 14px; color: #ffffff; margin-bottom: 10px; font-weight: bold; text-shadow: 1px 1px 2px #000000;">
                &copy; Made By Izayah Orona
            </div>
            
            <div id="fact-display">Loading...</div>
        </div>
    </div>

    <div class="game-layout">
        
        <div class="left-side">
            <div class="score-container">
                <h1>Baldi's Basics Clicker</h1>
                <div class="stats">Notebooks: <span id="notebook-count">0</span></div>
                <div class="nps-stats">NPS: <span id="nps-count">0</span></div>
            </div>

            <div class="clicker-box">
                <video id="first-clip" src="FirstClip.mp4" muted></video>
                <video id="second-clip" src="Secondclip.mp4" loop muted></video>

                <button id="baldi-btn">
                    <img src="ClickThis.png" alt="Baldi Target">
                </button>
            </div>
        </div>

        <div class="right-side">
            <div class="panel-header">
                <h3>School Store Upgrades</h3>
            </div>
            
            <div class="cube-wrapper">
                <div class="cube">
                    <div class="cube-face front"><img src="ClickThis.png" alt="cube"></div>
                    <div class="cube-face back"><img src="ClickThis.png" alt="cube"></div>
                    <div class="cube-face right"><img src="ClickThis.png" alt="cube"></div>
                    <div class="cube-face left"><img src="ClickThis.png" alt="cube"></div>
                    <div class="cube-face top"><img src="ClickThis.png" alt="cube"></div>
                    <div class="cube-face bottom"><img src="ClickThis.png" alt="cube"></div>
                </div>
            </div>

            <h4>Click Multipliers</h4>
            <button class="upgrade-btn" id="upgrade-click">
                Quarter ( +1 base click ) <br> Cost: <span id="click-cost">15</span> Notebooks
            </button>
            <button class="upgrade-btn" id="upgrade-multiplier">
                Math Textbook ( x2 total click multiplier ) <br> Cost: <span id="mult-cost">100</span> Notebooks
            </button>

            <h4>Passive Income</h4>
            <button class="upgrade-btn" id="upgrade-auto1">
                Shiny Quarter ( +1 NPS ) <br> Cost: <span id="auto1-cost">50</span> Notebooks
            </button>
            <button class="upgrade-btn" id="upgrade-auto2">
                BSODA ( +5 NPS ) <br> Cost: <span id="auto2-cost">250</span> Notebooks
            </button>
        </div>

    </div>

    <script src="Style2.js"></script>
</body>
</html>
